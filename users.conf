# Mini-Redis Access Control List (ACL)
# Format: username password role_number
# Roles: 0 = ADMIN, 1 = WRITER, 2 = READER

# Admin - Can execute SAVE, BGSAVE, DEL
admin admin123 0

# Writer - Can execute SET, INCR, APPEND, EXPIRE
alice writer123 1

# Reader - Can only execute GET, EXISTS, TTL
bob reader123 2